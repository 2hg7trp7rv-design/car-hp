name: Refresh lockfile (include Next.js SWC)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (generate package-lock.json)
        run: |
          npm install --no-audit --no-fund

      - name: Commit & push package-lock.json (if changed)
        run: |
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json was not generated."
            exit 1
          fi

          if git diff --quiet -- package-lock.json; then
            echo "No changes to package-lock.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package-lock.json
          git commit -m "chore: add/update package-lock.json (Next.js SWC)"
          git push
